# deploy/nginx/docjob.conf
#
# Host Nginx reverse proxy for DocJob (SP-5 T5). Terminates TLS and forwards
# everything to the `web` service, which docker-compose.yml deliberately
# publishes on 127.0.0.1:3000 ONLY (loopback) — this file is what actually
# exposes the app to the internet on 80/443.
#
# INSTALL (see DEPLOY.md for the full first-time sequence, including how to
# bootstrap the very first TLS certificate before this file's HTTPS block can
# load):
#   sudo cp deploy/nginx/docjob.conf /etc/nginx/sites-available/docjob.conf
#   sudo ln -s /etc/nginx/sites-available/docjob.conf /etc/nginx/sites-enabled/docjob.conf
#   sudo rm -f /etc/nginx/sites-enabled/default   # drop the stock default_server
#   sudo mkdir -p /var/www/certbot
#   sudo nginx -t && sudo systemctl reload nginx
#
# >>> REPLACE every occurrence of `docjob.example.com` / `www.docjob.example.com`
# >>> below with your real domain (including inside the certbot cert paths).

# --- Why the forwarded headers below matter (don't drop them) ---------------
# apps/web/src/lib/csrf.ts's `allowedOrigin()` derives the origin state-
# changing requests must match from AUTH_URL, but FALLS BACK to the request's
# own `Host` header + `X-Forwarded-Proto` whenever AUTH_URL is unset or
# unparsable — get Host/X-Forwarded-Proto wrong and every POST (login,
# mutations) can start failing CSRF.
# packages/auth/src/login.service.ts's login rate-limiter keys its per-IP
# attempt counter off `X-Forwarded-For`/`X-Real-IP` (via the web login route,
# apps/web/src/app/api/auth/login/route.ts) — without these forwarded
# correctly, every request looks like it comes from the Docker gateway IP,
# so one bad actor can lock out the whole shared bucket for everyone.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ---------------------------------------------------------------------------
# HTTP (80): ACME HTTP-01 challenge passthrough for certbot + redirect
# everything else to HTTPS. This block alone is what you deploy FIRST, before
# a certificate exists (see DEPLOY.md) — it never depends on cert files.
# ---------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name docjob.example.com www.docjob.example.com; # <-- REPLACE

    # Let certbot's webroot/HTTP-01 challenge resolve directly — must NOT be
    # redirected to HTTPS, or the challenge fails.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------------------------------------------------------------------------
# HTTPS (443): TLS termination + reverse proxy to the `web` container.
#
# NOTE: this block references a certificate that must already exist on disk
# (the standard `certbot --nginx`/`certonly` output paths). On a brand-new
# domain, `nginx -t`/reload will FAIL if you enable this block before running
# certbot — see DEPLOY.md's "TLS" section for the exact bootstrap order
# (obtain the cert first, THEN enable this block).
# ---------------------------------------------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name docjob.example.com www.docjob.example.com; # <-- REPLACE

    # Standard Let's Encrypt cert paths written by certbot.
    # <-- REPLACE docjob.example.com with your real domain in BOTH paths.
    ssl_certificate     /etc/letsencrypt/live/docjob.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/docjob.example.com/privkey.pem;
    # certbot also writes these two alongside the cert on first issuance —
    # include them if present (recommended TLS params + DH group).
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # --- Security headers --------------------------------------------------
    # HSTS: tell browsers to only ever use HTTPS for this origin from now on.
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    # Stop browsers from MIME-sniffing responses into an unintended type.
    add_header X-Content-Type-Options "nosniff" always;
    # Disallow framing entirely (equivalent to a CSP frame-ancestors 'none';
    # the app has no legitimate reason to be iframed).
    add_header X-Frame-Options "SAMEORIGIN" always;
    # Don't leak the full referrer URL (which may carry case IDs/paths) to
    # other origins; keep it same-origin-verbose, cross-origin-minimal.
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # --- Upload size ---------------------------------------------------------
    # apps/web/src/lib/storage.ts caps attachments at 25 MB
    # (MAX_ATTACHMENT_SIZE). 30m leaves headroom for multipart/base64 overhead
    # so nginx never 413s a request the app itself would accept.
    client_max_body_size 30m;

    # --- gzip ----------------------------------------------------------------
    # Next.js already compresses its own static asset responses; this covers
    # the app's dynamic HTML/JSON responses passing back through the proxy.
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        application/rss+xml
        image/svg+xml;

    # --- Liveness endpoint for load balancers / uptime monitors -------------
    # apps/web/src/app/api/health/route.ts — no auth, cheap `SELECT 1`.
    # Docker's own `web` healthcheck (docker-compose.yml) already polls this
    # in-container; point any EXTERNAL load balancer or uptime monitor at
    # https://docjob.example.com/api/health too. Proxied identically to `/`
    # below — broken out into its own `location` only so it's easy to find
    # and, if you ever want to, rate-limit or exempt from access logging
    # separately from the rest of the app.
    location /api/health {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # OVERWRITE (not $proxy_add_x_forwarded_for, which APPENDS to any
        # client-sent X-Forwarded-For). Nginx is the sole internet-facing hop
        # here — there is no trusted upstream proxy/CDN in front of it — so
        # $remote_addr is always the real, unspoofable connecting IP. The app
        # reads the LEFTMOST X-Forwarded-For token as the client IP (see
        # apps/web/src/app/api/auth/login/route.ts's clientIp() and
        # packages/api/src/context.ts) to key its rate-limiters; appending
        # would let a client prepend a fake IP of its choosing and bypass
        # every IP-based rate limit (login lockout, search, password reset).
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        access_log off; # keep routine health-poll noise out of the access log
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # See the header-rationale comment at the top of this file — these
        # four are load-bearing for CSRF + the login rate-limiter.
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # OVERWRITE (not $proxy_add_x_forwarded_for) — see the rationale in
        # the /api/health location above: single-proxy topology, no trusted
        # upstream, so overwriting with $remote_addr is correct and prevents
        # client-supplied X-Forwarded-For from spoofing rate-limiter IPs.
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Upgrade headers: no long-lived WebSocket in the app today, but this
        # keeps `Connection: upgrade` passing through cleanly for any future
        # streaming (SSE, tRPC subscriptions) or Next.js features that need it.
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}
