# Nginx reverse proxy for DocJob (docjob.kz)
#
# Install on the server as:
#   sudo cp nginx/docjob.kz.conf /etc/nginx/sites-available/docjob.kz
#   sudo ln -s /etc/nginx/sites-available/docjob.kz /etc/nginx/sites-enabled/docjob.kz
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#
# This is the HTTP (port 80) config. After it works, run:
#   sudo certbot --nginx -d docjob.kz -d www.docjob.kz
# Certbot will automatically add the HTTPS (443) server block and an
# HTTP->HTTPS redirect to this file.

server {
    listen 80;
    listen [::]:80;
    server_name docjob.kz www.docjob.kz;

    # Case attachments are capped at 25 MB by the app — allow a bit more so
    # uploads don't get rejected by nginx with a 413 before reaching Next.js.
    client_max_body_size 30M;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket / upgrade headers (harmless in prod, needed if used).
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # AI chat / search calls can take a while — don't cut them off early.
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
